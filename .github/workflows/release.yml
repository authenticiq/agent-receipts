name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-artifacts:
    name: build-${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_type: tar.gz
          - artifact_name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive_type: tar.gz
          - artifact_name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            archive_type: tar.gz
          - artifact_name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            archive_type: tar.gz
          - artifact_name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_type: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache: true

      - name: Build release binaries
        run: cargo build --release --locked --bin receipts --bin generate-fixtures --target ${{ matrix.target }}

      - name: Package release archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          archive_name="agent-receipts-${GITHUB_REF_NAME}-${{ matrix.artifact_name }}"
          mkdir -p dist/package
          cp LICENSE README.md dist/package/
          cp "target/${{ matrix.target }}/release/receipts" dist/package/
          cp "target/${{ matrix.target }}/release/generate-fixtures" dist/package/
          tar -czf "dist/${archive_name}.tar.gz" -C dist/package .

      - name: Package release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveName = "agent-receipts-$env:GITHUB_REF_NAME-${{ matrix.artifact_name }}"
          New-Item -ItemType Directory -Force -Path dist/package | Out-Null
          Copy-Item LICENSE, README.md -Destination dist/package
          Copy-Item "target/${{ matrix.target }}/release/receipts.exe" -Destination dist/package
          Copy-Item "target/${{ matrix.target }}/release/generate-fixtures.exe" -Destination dist/package
          Compress-Archive -Path dist/package/* -DestinationPath "dist/$archiveName.zip"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: dist/*

  publish-github-release:
    name: publish-github-release
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(dist/*.tar.gz dist/*.zip)
          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release archives found." >&2
            exit 1
          fi
          sha256sum "${assets[@]}" > dist/sha256sums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/sha256sums.txt

  publish-crate:
    name: publish-crate
    needs: publish-github-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check crates.io token availability
        id: cargo-token
        shell: bash
        run: |
          if [[ -n "${{ secrets.CARGO_REGISTRY_TOKEN }}" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "CARGO_REGISTRY_TOKEN is not configured; skipping cargo publish."
          fi

      - name: Checkout
        if: steps.cargo-token.outputs.present == 'true'
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        if: steps.cargo-token.outputs.present == 'true'
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: true

      - name: Publish crate to crates.io
        if: steps.cargo-token.outputs.present == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked